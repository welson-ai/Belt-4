name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Test job - runs unit tests for all contracts
  test:
    name: Test Contracts
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Test lending-pool contract
      run: |
        cd contracts/lending-pool
        cargo test --verbose
        
    - name: Test lxlm-token contract
      run: |
        cd contracts/lxlm-token
        cargo test --verbose
        
    - name: Test liquidation contract
      run: |
        cd contracts/liquidation
        cargo test --verbose
        
    - name: Test frontend
      run: |
        cd frontend
        npm ci
        npm run test:ci || true  # Allow frontend tests to fail for now

  # Build job - builds WASM contracts
  build:
    name: Build WASM Contracts
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Build lending-pool contract
      run: |
        cd contracts/lending-pool
        cargo build --target wasm32-unknown-unknown --release
        
    - name: Build lxlm-token contract
      run: |
        cd contracts/lxlm-token
        cargo build --target wasm32-unknown-unknown --release
        
    - name: Build liquidation contract
      run: |
        cd contracts/liquidation
        cargo build --target wasm32-unknown-unknown --release
        
    - name: Upload WASM artifacts
      uses: actions/upload-artifact@v3
      with:
        name: wasm-contracts
        path: |
          contracts/lending-pool/target/wasm32-unknown-unknown/release/lending-pool.wasm
          contracts/lxlm-token/target/wasm32-unknown-unknown/release/lxlm-token.wasm
          contracts/liquidation/target/wasm32-unknown-unknown/release/liquidation.wasm
        retention-days: 7

  # Deploy to testnet (only on PRs)
  deploy-preview:
    name: Deploy to Testnet (Preview)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download WASM artifacts
      uses: actions/download-artifact@v3
      with:
        name: wasm-contracts
        path: ./artifacts
        
    - name: Install Stellar CLI
      run: |
        curl -L https://github.com/stellar/soroban-tools/releases/latest/download/soroban-cli-install.sh | sh
        echo "$HOME/.soroban/bin" >> $GITHUB_PATH
        
    - name: Deploy contracts to testnet
      run: |
        chmod +x scripts/deploy.sh
        # Create a modified deploy script for CI
        cat > scripts/deploy-ci.sh << 'EOF'
        #!/bin/bash
        set -e
        
        # Copy artifacts to expected locations
        mkdir -p contracts/lending-pool/target/wasm32-unknown-unknown/release/
        mkdir -p contracts/lxlm-token/target/wasm32-unknown-unknown/release/
        mkdir -p contracts/liquidation/target/wasm32-unknown-unknown/release/
        
        cp artifacts/lending-pool.wasm contracts/lending-pool/target/wasm32-unknown-unknown/release/
        cp artifacts/lxlm-token.wasm contracts/lxlm-token/target/wasm32-unknown-unknown/release/
        cp artifacts/liquidation.wasm contracts/liquidation/target/wasm32-unknown-unknown/release/
        
        # Deploy to testnet
        ./scripts/deploy.sh
        EOF
        
        chmod +x scripts/deploy-ci.sh
        ./scripts/deploy-ci.sh
        
    - name: Comment on PR with contract addresses
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          try {
            const addresses = JSON.parse(fs.readFileSync('deployed-addresses.json', 'utf8'));
            const comment = `
            ## 🚀 Preview Deployment Complete
            
            Contracts deployed to Stellar Testnet:
            
            | Contract | Address |
            |----------|---------|
            | lXLM Token | \`${addresses.lxlm_token || 'N/A'}\` |
            | Lending Pool | \`${addresses.lending_pool || 'N/A'}\` |
            | Liquidation | \`${addresses.liquidation || 'N/A'}\` |
            
            **Note:** These are testnet deployments for review only.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('Could not read addresses file:', error.message);
          }

  # Frontend deployment
  vercel-deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Build frontend
      run: |
        cd frontend
        npm run build
        
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./frontend
        vercel-args: '--prod'

  # Security scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit
        
    - name: Run frontend security audit
      run: |
        cd frontend
        npm audit --audit-level moderate

  # Code quality
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Check formatting
      run: |
        cd contracts/lending-pool && cargo fmt -- --check
        cd ../lxlm-token && cargo fmt -- --check
        cd ../liquidation && cargo fmt -- --check
        
    - name: Run clippy
      run: |
        cd contracts/lending-pool && cargo clippy -- -D warnings
        cd ../lxlm-token && cargo clippy -- -D warnings
        cd ../liquidation && cargo clippy -- -D warnings
        
    - name: Frontend lint
      run: |
        cd frontend
        npm ci
        npm run lint
